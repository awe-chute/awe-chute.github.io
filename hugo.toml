baseURL = 'https://awe-chute.github.io/'
languageCode = 'en-us'
title = 'EdgeNotes'
theme = 'PaperMod'

[pagination]
pagerSize = 5

[params]

# ---- Core UI features ----
ShowReadingTime = true
ShowShareButtons = false
ShowCodeCopyButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowToc = true

# ---- THIS is what you're missing for homepage behavior ----
mainSections = ["posts"]

# ---- Optional but common PaperMod defaults ----
defaultTheme = "auto"
disableThemeToggle = false

# ---- Optional homepage intro (can be removed if you don't want it) ----
[params.homeInfoParams]
Title = "EdgeNotes"
Content = "Thoughts, notes, and experiments"

[[menu.main]]
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
name = "About"
url = "/about/"
weight = 20